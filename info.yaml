# Tiny Tapeout project information
project:
  title:        "Line Follower Robot controller"      # Project title
  author:       "Escuela Colombiana de Ingenieria Julio Gravito"      # Your name
  discord:      "ibanez0739"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "Basic controller for a line follower of 8 sensors"      # One line description of what your project does
  language:     "Verilog"  # other examples include Verilog, SystemVerilog, Amaranth, etc
  clock_hz:     512000       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_line_follower_c"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "tt_um_line_follower_c.v" # Top Module
    - "pwm.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "Sensor 1"
  ui[1]: "Sensor 2"
  ui[2]: "Sensor 3"
  ui[3]: "Sensor 4"
  ui[4]: "Sensor 5"
  ui[5]: "Sensor 6"
  ui[6]: "Sensor 7"
  ui[7]: "Sensor 8"

  # Outputs
  uo[0]: "PWM Output Left Motor"
  uo[1]: "PWM Output Right Motor"
  uo[2]: "LED ON"
  uo[3]: ""
  uo[4]: ""
  uo[5]: ""
  uo[6]: ""
  uo[7]: ""

  # Bidirectional pins
  uio[0]: "ADJUST 1"
  uio[1]: "ADJUST 2"
  uio[2]: "ADJUST 3"
  uio[3]: "ADJUST 4"
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
